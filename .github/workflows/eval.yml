name: Eval Regression Gate

on:
  pull_request:
    branches: [main]

jobs:
  eval:
    name: Retrieval, Agent & Adversarial Regression Check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run retrieval eval (best mode — hybrid)
        if: env.DATABASE_URL != '' && env.VOYAGE_API_KEY != ''
        run: python -m backend.eval.run --mode hybrid --strict

      - name: Run agent eval
        if: env.DATABASE_URL != '' && env.ANTHROPIC_API_KEY != ''
        run: python -m backend.eval.run --agent-eval

      - name: Run adversarial eval
        if: env.ANTHROPIC_API_KEY != ''
        run: python -m backend.eval.run --adversarial-eval

      - name: Check for regressions
        id: regression_check
        run: |
          set -o pipefail
          python -m backend.eval.check_regression --strict 2>&1 | tee "$GITHUB_WORKSPACE/regression_output.txt"

      - name: Update benchmark history and regenerate benchmark.md
        if: env.DATABASE_URL != '' && env.VOYAGE_API_KEY != '' && github.event_name == 'pull_request'
        run: |
          python -m backend.eval.run --all-modes --benchmark --strict
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/benchmark.md docs/benchmark-history.jsonl || true
          git diff --cached --quiet || git commit -m "chore(eval): update benchmark and history [skip ci]"
          git push origin HEAD:${{ github.head_ref }} || true

      - name: Post metric delta as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const filePath = path.join(process.env.GITHUB_WORKSPACE, 'regression_output.txt');
            let output = '';
            try {
              output = fs.readFileSync(filePath, 'utf8');
            } catch (e) {
              output = 'Regression check did not run (likely missing DATABASE_URL / API key secrets).';
            }
            const icon = '${{ steps.regression_check.outcome }}' === 'success' ? '✅' : '❌';
            const body = `## ${icon} Eval Regression Check\n\n\`\`\`\n${output}\n\`\`\`\n\n_Run \`python -m backend.eval.run --all-modes --benchmark\` locally to see the full comparison table._`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
